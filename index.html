<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Rock Paper Scissors</title>
        <script src="logic.js"></script>
    </head>
    <body>
        <div id="ground">
            <div id="choices">
                <button class="choice" id="rock" onclick="computerChoice('rock')">Rock</button>
                <button class="choice" id="paper" onclick="computerChoice('paper')">Paper</button>
                <button class="choice" id="scissors" onclick="computerChoice('scissors')">Scissors</button>
            </div>
            <div id="result">Play Game</div>
            <br>
            <button id="score" onclick="check()">Score</button>
            <button id="reset" onclick="reset()">Reset</button>
            <h5 id="scoreCard"></h5>
        </div>
    </body>
</html>
